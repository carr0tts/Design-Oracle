<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Design Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-dim: #8a6d28;
    --gold-pale: #e8d49a;
    --gold-faint: rgba(201,168,76,0.08);
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #161616;
    --bg4: #1c1c1c;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #e8e0d4;
    --text2: #888880;
    --text3: #444440;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 4rem;
  }

  /* ── TOP NAV ── */
  .nav {
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 1.5rem 0;
    margin-bottom: 0.5rem;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .nav-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .nav-btn {
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .nav-btn.active { background: var(--gold-faint); border-color: var(--gold); color: var(--gold); }

  /* ── MAIN CONTAINER ── */
  .container {
    width: 100%;
    max-width: 900px;
    padding: 0 1.5rem;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }

  .header-sub {
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text3);
  }

  /* ── ROOM BAR ── */
  .room-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .room-btn {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .room-btn:hover { border-color: var(--gold); color: var(--gold); }
  .room-btn.active { background: var(--gold-faint); border-color: var(--gold); color: var(--gold); }

  /* ── DICE GRID ── */
  .dice-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  @media (max-width: 600px) {
    .dice-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .die-card {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 0.75rem 0.85rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.25s, background 0.25s;
    user-select: none;
  }

  .die-card:hover { border-color: var(--border2); }

  .die-card.locked {
    background: #161200;
    border-color: rgba(201,168,76,0.35);
  }

  .die-card.rolling { animation: shake 0.45s ease-in-out; }

  @keyframes shake {
    0%,100% { transform: rotate(0) scale(1); }
    15% { transform: rotate(-5deg) scale(1.04); }
    35% { transform: rotate(5deg) scale(1.06); }
    55% { transform: rotate(-3deg) scale(1.03); }
    75% { transform: rotate(2deg) scale(1.015); }
  }

  .lock-btn {
    position: absolute;
    top: 7px; right: 8px;
    background: none;
    border: none;
    cursor: pointer;
    width: 16px; height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  .lock-btn:hover { opacity: 0.7; }
  .die-card.locked .lock-btn { opacity: 1; }

  .lock-icon {
    width: 11px; height: 11px;
    border: 1.5px solid var(--gold);
    border-radius: 2px;
    position: relative;
  }

  .lock-icon::before {
    content: '';
    position: absolute;
    top: -6px; left: 1px;
    width: 7px; height: 6px;
    border: 1.5px solid var(--gold);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }

  .lock-icon.unlocked::before {
    left: 4px;
    border-left-color: transparent;
    border-radius: 0 4px 4px 0;
  }

  .die-label {
    font-size: 0.5rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.55rem;
  }

  .die-card.locked .die-label { color: var(--gold-dim); }

  .die-value {
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    line-height: 1.35;
    min-height: 2.5em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.12s;
    color: #ccc;
  }

  .die-card.locked .die-value { color: var(--gold-pale); }
  .die-value.flash { opacity: 0; }

  /* Color scheme swatches */
  .swatch-row {
    display: flex;
    gap: 3px;
    justify-content: center;
    margin-bottom: 6px;
    min-height: 14px;
  }

  .swatch {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 0.5px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  /* ── ROLL BUTTON ── */
  .roll-btn {
    display: block;
    width: 100%;
    padding: 0.9rem;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    margin-bottom: 12px;
  }

  .roll-btn:hover { background: var(--gold); color: #0a0a0a; }
  .roll-btn:active { transform: scale(0.99); }

  /* ── BRIEF BOX ── */
  .brief-box {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-left: 2px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
  }

  .brief-label {
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .brief-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--text2);
    font-size: 0.88rem;
    line-height: 1.8;
    transition: opacity 0.2s;
  }

  .brief-text.flash { opacity: 0; }

  /* ── SAVE ROW ── */
  .save-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .save-input {
    flex: 1;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text);
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }

  .save-input::placeholder { color: var(--text3); }
  .save-input:focus { border-color: var(--gold); }

  .save-btn {
    background: var(--gold-faint);
    border: 0.5px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .save-btn:hover { background: rgba(201,168,76,0.18); }

  /* ── SAVES VIEW ── */
  .saves-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2rem 0 1.25rem;
  }

  .saves-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
  }

  .saves-count {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .saves-empty {
    text-align: center;
    padding: 4rem 0;
    color: var(--text3);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 2;
  }

  .saves-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .saved-card {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.1rem 0.9rem;
    position: relative;
    transition: border-color 0.2s;
  }

  .saved-card:hover { border-color: var(--border2); }

  .saved-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .saved-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
    margin-right: 8px;
  }

  .saved-card-delete {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .saved-card-delete:hover { color: #c44a4a; }

  .saved-card-swatches {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }

  .saved-card-swatch {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 0.5px solid rgba(255,255,255,0.07);
  }

  .saved-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--bg4);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 2px 8px;
  }

  .saved-card-brief {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--text3);
    line-height: 1.65;
    border-top: 0.5px solid var(--border);
    padding-top: 8px;
    margin-top: 2px;
  }

  .load-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 6px;
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .load-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-faint); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg4);
    border: 0.5px solid var(--gold);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── HINT ── */
  .hint {
    text-align: center;
    font-size: 0.5rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 10px;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">The Design Oracle</div>
  <div class="nav-right">
    <button class="nav-btn active" onclick="showView('oracle')">Oracle</button>
    <button class="nav-btn" onclick="showView('saves')" id="saves-nav-btn">Saved boards</button>
  </div>
</nav>

<div class="container">

  <!-- ORACLE VIEW -->
  <div class="view active" id="view-oracle">
    <div class="header">
      <h1 class="header-title">Roll the Dice</h1>
      <p class="header-sub">Discover your interior design brief</p>
    </div>

    <div class="room-bar" id="roomBar"></div>
    <div class="dice-grid" id="diceGrid"></div>
    <button class="roll-btn" onclick="rollAll()">Roll unlocked dice</button>

    <div class="brief-box">
      <div class="brief-label">Your design brief</div>
      <div class="brief-text" id="briefText">Choose a room and roll the dice...</div>
    </div>

    <div class="save-row">
      <input class="save-input" id="boardName" type="text" placeholder="Name this board..." maxlength="40">
      <button class="save-btn" onclick="saveBoard()">Save board</button>
    </div>

    <p class="hint">Click any die to re-roll it &nbsp;·&nbsp; Lock icon to hold a result</p>
  </div>

  <!-- SAVES VIEW -->
  <div class="view" id="view-saves">
    <div class="saves-header">
      <div class="saves-title">Saved Boards</div>
      <div class="saves-count" id="savesCount">0 boards</div>
    </div>
    <div id="savesGrid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

let currentRoom = 'any';
let locked = {};
let currentValues = {};
let currentSchemeObj = null;

function getRoomFaces(die) {
  if (die.isColorScheme) return COLOR_SCHEMES[currentRoom] || COLOR_SCHEMES.any;
  const f = die.faces;
  return (f[currentRoom] && f[currentRoom].length) ? f[currentRoom] : f.any;
}

function buildRoomBar() {
  const bar = document.getElementById('roomBar');
  bar.innerHTML = '';
  ROOMS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (r.id === currentRoom ? ' active' : '');
    btn.textContent = r.label;
    btn.onclick = () => {
      currentRoom = r.id;
      document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      locked = {};
      buildDice();
      rollAll();
    };
    bar.appendChild(btn);
  });
}

function buildDice() {
  const grid = document.getElementById('diceGrid');
  grid.innerHTML = '';
  BASE_DICE.forEach((die) => {
    const card = document.createElement('div');
    card.className = 'die-card' + (locked[die.id] ? ' locked' : '');
    card.id = 'die-' + die.id;

    const lockBtn = document.createElement('button');
    lockBtn.className = 'lock-btn';
    lockBtn.title = locked[die.id] ? 'Unlock' : 'Lock result';
    lockBtn.innerHTML = `<div class="lock-icon${locked[die.id] ? '' : ' unlocked'}"></div>`;
    lockBtn.onclick = (e) => { e.stopPropagation(); toggleLock(die.id); };
    card.appendChild(lockBtn);

    const label = document.createElement('div');
    label.className = 'die-label';
    label.textContent = die.label;
    card.appendChild(label);

    if (die.isColorScheme) {
      const row = document.createElement('div');
      row.className = 'swatch-row';
      row.id = 'swatches-' + die.id;
      if (currentSchemeObj) {
        currentSchemeObj.swatches.forEach(c => {
          const s = document.createElement('div');
          s.className = 'swatch';
          s.style.background = c;
          row.appendChild(s);
        });
      }
      card.appendChild(row);
    }

    const val = document.createElement('div');
    val.className = 'die-value';
    val.id = 'val-' + die.id;
    val.textContent = currentValues[die.id] || '—';
    card.appendChild(val);

    card.onclick = () => { if (!locked[die.id]) rollSingle(die.id); else toggleLock(die.id); };
    grid.appendChild(card);
  });
}

function toggleLock(dieId) {
  locked[dieId] = !locked[dieId];
  const card = document.getElementById('die-' + dieId);
  if (!card) return;
  card.classList.toggle('locked', !!locked[dieId]);
  const icon = card.querySelector('.lock-icon');
  if (icon) icon.classList.toggle('unlocked', !locked[dieId]);
  const btn = card.querySelector('.lock-btn');
  if (btn) btn.title = locked[dieId] ? 'Unlock' : 'Lock result';
}

function animateDie(dieId) {
  const card = document.getElementById('die-' + dieId);
  if (!card) return;
  card.classList.remove('rolling');
  void card.offsetWidth;
  card.classList.add('rolling');
  setTimeout(() => card.classList.remove('rolling'), 450);
}

function setDieValue(die, pick) {
  const valEl = document.getElementById('val-' + die.id);
  if (!valEl) return;
  valEl.classList.add('flash');
  setTimeout(() => {
    if (die.isColorScheme) {
      currentSchemeObj = pick;
      currentValues[die.id] = pick.name;
      updateSwatches(die.id, pick);
      valEl.textContent = pick.name;
    } else {
      currentValues[die.id] = pick;
      valEl.textContent = pick;
    }
    valEl.classList.remove('flash');
  }, 130);
}

function updateSwatches(dieId, scheme) {
  const row = document.getElementById('swatches-' + dieId);
  if (!row) return;
  row.innerHTML = '';
  scheme.swatches.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    row.appendChild(s);
  });
}

function rollSingle(dieId) {
  const die = BASE_DICE.find(d => d.id === dieId);
  if (!die || locked[dieId]) return;
  animateDie(dieId);
  const faces = getRoomFaces(die);
  const pick = faces[Math.floor(Math.random() * faces.length)];
  setDieValue(die, pick);
  setTimeout(updateBrief, 200);
}

function rollAll() {
  const briefEl = document.getElementById('briefText');
  if (briefEl) briefEl.classList.add('flash');
  BASE_DICE.forEach((die, idx) => {
    if (locked[die.id]) return;
    setTimeout(() => {
      animateDie(die.id);
      const faces = getRoomFaces(die);
      const pick = faces[Math.floor(Math.random() * faces.length)];
      setDieValue(die, pick);
    }, idx * 60);
  });
  setTimeout(() => {
    updateBrief();
    if (briefEl) briefEl.classList.remove('flash');
  }, BASE_DICE.length * 60 + 300);
}

function updateBrief() {
  const room = ROOMS.find(r => r.id === currentRoom)?.label || 'room';
  const v = currentValues;
  if (!v.style) return;
  const scheme = currentSchemeObj
    ? v.scheme + ' (' + currentSchemeObj.desc + ')'
    : 'a curated color scheme';
  const brief = `A ${(v.mood||'').toLowerCase()} ${(v.style||'').toLowerCase()} ${room.toLowerCase()}, rooted in ${(v.era||'').toLowerCase()} aesthetics. The surfaces call for ${(v.material||'').toLowerCase()}, bathed in ${(v.lighting||'').toLowerCase()}. Anchor the space in a ${(v.palette||'').toLowerCase()} palette, organized as a ${scheme}.`;
  const el = document.getElementById('briefText');
  if (el) { el.textContent = brief; el.classList.remove('flash'); }
}

function saveBoard() {
  const name = document.getElementById('boardName').value.trim();
  if (!name) { showToast('Give your board a name first'); return; }
  if (!currentValues.style) { showToast('Roll the dice first'); return; }
  const boards = loadBoards();
  const board = {
    id: Date.now(),
    name,
    room: currentRoom,
    roomLabel: ROOMS.find(r => r.id === currentRoom)?.label,
    values: { ...currentValues },
    scheme: currentSchemeObj ? { ...currentSchemeObj } : null,
    brief: document.getElementById('briefText')?.textContent || '',
    saved: new Date().toLocaleDateString(),
  };
  boards.unshift(board);
  localStorage.setItem('design-oracle-boards', JSON.stringify(boards));
  document.getElementById('boardName').value = '';
  updateSavesBadge();
  showToast('Board saved!');
}

function loadBoards() {
  try { return JSON.parse(localStorage.getItem('design-oracle-boards') || '[]'); }
  catch { return []; }
}

function deleteBoard(id) {
  const boards = loadBoards().filter(b => b.id !== id);
  localStorage.setItem('design-oracle-boards', JSON.stringify(boards));
  renderSaves();
  updateSavesBadge();
  showToast('Board deleted');
}

function loadBoard(board) {
  currentRoom = board.room || 'any';
  currentValues = { ...board.values };
  currentSchemeObj = board.scheme || null;
  locked = {};
  document.querySelectorAll('.room-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === board.roomLabel);
  });
  buildDice();
  BASE_DICE.forEach(die => {
    const valEl = document.getElementById('val-' + die.id);
    if (valEl && currentValues[die.id]) valEl.textContent = currentValues[die.id];
    if (die.isColorScheme && currentSchemeObj) updateSwatches(die.id, currentSchemeObj);
  });
  const briefEl = document.getElementById('briefText');
  if (briefEl) briefEl.textContent = board.brief;
  showView('oracle');
  showToast('Board loaded!');
}

function renderSaves() {
  const boards = loadBoards();
  const grid = document.getElementById('savesGrid');
  const count = document.getElementById('savesCount');
  if (!grid) return;
  count.textContent = boards.length + ' board' + (boards.length !== 1 ? 's' : '');
  if (boards.length === 0) {
    grid.innerHTML = '<div class="saves-empty">No saved boards yet.<br>Roll the dice and save a board to see it here.</div>';
    return;
  }
  grid.innerHTML = '';
  const g = document.createElement('div');
  g.className = 'saves-grid';
  boards.forEach(board => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    const swatches = board.scheme?.swatches || [];
    card.innerHTML = `
      <div class="saved-card-top">
        <div class="saved-card-name">${board.name}</div>
        <button class="saved-card-delete" onclick="deleteBoard(${board.id})" title="Delete">✕</button>
      </div>
      ${swatches.length ? `<div class="saved-card-swatches">${swatches.map(c => `<div class="saved-card-swatch" style="background:${c}"></div>`).join('')}</div>` : ''}
      <div class="saved-card-tags">
        ${board.roomLabel ? `<span class="tag">${board.roomLabel}</span>` : ''}
        ${board.values?.style ? `<span class="tag">${board.values.style}</span>` : ''}
        ${board.values?.scheme ? `<span class="tag">${board.values.scheme}</span>` : ''}
        ${board.values?.era ? `<span class="tag">${board.values.era}</span>` : ''}
      </div>
      <div class="saved-card-brief">${board.brief}</div>
      <button class="load-btn" onclick='loadBoard(${JSON.stringify(board).replace(/'/g,"&#39;")})'>Load this board</button>
    `;
    g.appendChild(card);
  });
  grid.appendChild(g);
}

function updateSavesBadge() {
  const n = loadBoards().length;
  const btn = document.getElementById('saves-nav-btn');
  if (btn) btn.textContent = n > 0 ? `Saved boards (${n})` : 'Saved boards';
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id === 'oracle') document.querySelectorAll('.nav-btn')[0].classList.add('active');
  if (id === 'saves') { document.querySelectorAll('.nav-btn')[1].classList.add('active'); renderSaves(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
BASE_DICE.forEach(die => { currentValues[die.id] = ''; });
buildRoomBar();
buildDice();
rollAll();
updateSavesBadge();
</script>
